document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"85fd5506-2460-418a-bfc0-45793fecc6f4\"><\/script>\n\n</head>\n<body>\n<x-dc>\n<helmet>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin>\n  <link href=\"https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap\" rel=\"stylesheet\">\n\n  <style>/* cyrillic */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic */\n/* vietnamese */\n/* latin-ext */\n/* latin */\n/* cyrillic */\n/* latin-ext */\n/* latin */\n/* cyrillic */\n/* latin-ext */\n/* latin */\n/* cyrillic */\n/* latin-ext */\n/* latin */\n</style>\n  <style>\n    * { box-sizing: border-box; }\n    body { margin: 0; -webkit-font-smoothing: antialiased; }\n    a { color: inherit; text-decoration: none; }\n  </style>\n</helmet>\n\n<div style=\"font-family: 'Noto Sans JP', sans-serif; background: oklch(97% 0.02 75); color: oklch(19% 0.02 45); overflow-x: hidden;\">\n\n  <!-- HEADER -->\n  <header data-screen-label=\"Header\" style=\"position: sticky; top: 0; z-index: 50; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px clamp(20px, 5vw, 64px); background: color-mix(in srgb, oklch(97% 0.02 75) 90%, transparent); backdrop-filter: blur(10px); border-bottom: 1px solid oklch(88% 0.02 60);\">\n    <div style=\"display: flex; align-items: center; gap: 10px;\">\n      <div style=\"{{ logoMarkStyle }}\"></div>\n      <span style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(20px, 2.4vw, 25px); letter-spacing: -0.02em;\">オキトレ</span>\n    </div>\n    <nav style=\"display: flex; align-items: center; gap: clamp(10px, 2vw, 28px); flex-wrap: nowrap; overflow-x: auto;\">\n      <a href=\"#concept\" style=\"font-size: 14px; font-weight: 700; color: oklch(35% 0.02 50); white-space: nowrap;\">オキトレとは</a>\n      <a href=\"#plans\" style=\"font-size: 14px; font-weight: 700; color: oklch(35% 0.02 50); white-space: nowrap;\">料金プラン</a>\n      <a href=\"#faq\" style=\"font-size: 14px; font-weight: 700; color: oklch(35% 0.02 50); white-space: nowrap;\">よくある質問</a>\n      <a href=\"#plans\" style=\"{{ ctaButtonStyle }}\" style-hover=\"filter: brightness(0.92);\">申し込む</a>\n    </nav>\n  </header>\n\n  <!-- HERO -->\n  <section data-screen-label=\"Hero\" style=\"{{ heroSectionStyle }}\">\n    <div style=\"max-width: 1160px; margin: 0 auto; padding: clamp(56px, 9vw, 120px) clamp(20px, 6vw, 64px); display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: clamp(40px, 6vw, 72px); align-items: center;\">\n      <div>\n        <div style=\"{{ heroBadgeStyle }}\">朝活コミュニティ「オキトレ」</div>\n        <h1 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(34px, 5.2vw, 58px); line-height: 1.3; margin: 0 0 24px; letter-spacing: -0.01em;\">早起きは、才能じゃない。<br>習慣だ。</h1>\n        <p style=\"{{ heroSubTextStyle }}\">夜21時までに\"宣言\"、朝は仲間と\"通話\"。オキトレは、起きられない自分を卒業して、朝の時間で努力できる自分に変わるための朝活コミュニティです。</p>\n        <div style=\"display: flex; gap: 16px; flex-wrap: wrap; align-items: center;\">\n          <a href=\"#plans\" style=\"{{ heroPrimaryCtaStyle }}\" style-hover=\"filter: brightness(0.92);\">今すぐ申し込む</a>\n          <a href=\"#plans\" style=\"{{ heroSecondaryLinkStyle }}\">料金を見る ↓</a>\n        </div>\n      </div>\n      <div style=\"{{ heroVisualStyle }}\">\n        <img src=\"e8b73179-5784-464f-9ee5-39ddd8305a1e\" alt=\"オキトレ\" style=\"width: 100%; height: 100%; object-fit: cover; display: block;\">\n      </div>\n    </div>\n  </section>\n\n  <!-- PROBLEMS -->\n  <section data-screen-label=\"Problems\" style=\"padding: clamp(56px, 8vw, 100px) clamp(20px, 6vw, 64px);\">\n    <div style=\"max-width: 760px; margin: 0 auto;\">\n      <h2 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(26px, 3.4vw, 36px); margin: 0 0 12px;\">こんな夜を、繰り返していませんか？</h2>\n      <p style=\"color: oklch(45% 0.03 50); font-size: 16px; margin: 0 0 40px;\">意思の力だけで早起きしようとするから、続かない。</p>\n      <div style=\"display: flex; flex-direction: column;\">\n        <sc-for list=\"{{ problems }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <div style=\"display: flex; align-items: baseline; gap: 24px; padding: 26px 0; border-bottom: 1px solid oklch(87% 0.02 60);\">\n            <span style=\"{{ accentIndexStyle }}\">{{ item.index }}</span>\n            <p style=\"font-size: clamp(16px, 1.6vw, 19px); font-weight: 600; line-height: 1.6; margin: 0;\">{{ item.text }}</p>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n  </section>\n\n  <!-- CONCEPT -->\n  <section id=\"concept\" data-screen-label=\"Concept\" style=\"background: oklch(21% 0.03 265); color: oklch(93% 0.02 90); padding: clamp(64px, 9vw, 120px) clamp(20px, 6vw, 64px);\">\n    <div style=\"max-width: 780px; margin: 0 auto;\">\n      <p style=\"{{ accentTextStyle }} font-weight: 700; font-size: 13px; letter-spacing: 0.14em; margin: 0 0 18px;\">CONCEPT</p>\n      <h2 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(26px, 3.4vw, 40px); line-height: 1.5; margin: 0 0 28px;\">オキトレとは、<span style=\"{{ accentTextStyle }}\">宣言と通話</span>で<br>起きる理由をつくる仕組み。</h2>\n      <p style=\"font-size: clamp(15px, 1.2vw, 18px); line-height: 2; color: oklch(75% 0.03 90); margin: 0;\">「明日は早起きする」という決意は、朝になると簡単に消える。だからオキトレでは、前の夜に仲間へ宣言し、朝はみんなで朝活通話する。一人の意思に頼らず、仕組みで起きる。それがオキトレの朝活です。</p>\n    </div>\n  </section>\n\n  <!-- STEPS -->\n  <section data-screen-label=\"Steps\" style=\"padding: clamp(56px, 8vw, 100px) clamp(20px, 6vw, 64px); max-width: 1160px; margin: 0 auto;\">\n    <h2 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(26px, 3.4vw, 36px); margin: 0 0 48px;\">オキトレの流れ</h2>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 40px;\">\n      <sc-for list=\"{{ steps }}\" as=\"item\" hint-placeholder-count=\"3\">\n        <div style=\"{{ stepColumnStyle }}\">\n          <span style=\"{{ accentBigNumberStyle }}\">{{ item.n }}</span>\n          <h3 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 19px; margin: 14px 0 10px;\">{{ item.title }}</h3>\n          <p style=\"font-size: 15px; line-height: 1.8; color: oklch(45% 0.03 50); margin: 0;\">{{ item.desc }}</p>\n        </div>\n      </sc-for>\n    </div>\n  </section>\n\n  <!-- PLANS -->\n  <section id=\"plans\" data-screen-label=\"Plans\" style=\"padding: clamp(56px, 8vw, 100px) clamp(20px, 6vw, 64px); background: oklch(94% 0.015 65);\">\n    <div style=\"max-width: 1000px; margin: 0 auto;\">\n      <h2 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(26px, 3.4vw, 36px); text-align: center; margin: 0 0 12px;\">本気度で選べる、2つのプラン</h2>\n      <p style=\"text-align: center; color: oklch(45% 0.03 50); font-size: 16px; margin: 0 0 48px;\">まずは軽く、本気になったらProへ。</p>\n      <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; align-items: start;\">\n        <sc-for list=\"{{ plans }}\" as=\"item\" hint-placeholder-count=\"2\">\n          <div style=\"{{ item.cardStyle }}\">\n            <div style=\"display: flex; align-items: center; gap: 10px; margin: 0 0 8px;\">\n              <h3 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 21px; margin: 0;\">{{ item.name }}</h3>\n              <sc-if value=\"{{ item.badge }}\" hint-placeholder-val=\"{{ false }}\">\n                <span style=\"{{ item.badgeStyle }}\">{{ item.badge }}</span>\n              </sc-if>\n            </div>\n            <div style=\"display: flex; align-items: baseline; gap: 4px; margin: 0 0 28px;\">\n              <span style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 38px;\">¥{{ item.price }}</span>\n              <span style=\"font-size: 15px; font-weight: 700; color: oklch(45% 0.03 50);\">/月</span>\n            </div>\n            <div style=\"display: flex; flex-direction: column; gap: 14px; margin-bottom: 32px;\">\n              <sc-for list=\"{{ item.features }}\" as=\"feat\" hint-placeholder-count=\"4\">\n                <div style=\"display: flex; align-items: flex-start; gap: 10px;\">\n                  <span style=\"{{ item.checkStyle }}\">✓</span>\n                  <span style=\"font-size: 15px; line-height: 1.6; font-weight: 600;\">{{ feat }}</span>\n                </div>\n              </sc-for>\n            </div>\n            <a href=\"{{ item.link }}\" style=\"{{ item.ctaStyle }}\" style-hover=\"filter: brightness(0.94);\">{{ item.cta }}</a>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n  </section>\n\n  <!-- AUDIENCE -->\n  <section data-screen-label=\"Audience\" style=\"padding: clamp(56px, 8vw, 100px) clamp(20px, 6vw, 64px); max-width: 1160px; margin: 0 auto;\">\n    <h2 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(26px, 3.4vw, 36px); margin: 0 0 40px;\">こんな人におすすめ</h2>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 48px;\">\n      <sc-for list=\"{{ audiences }}\" as=\"item\" hint-placeholder-count=\"2\">\n        <div style=\"border-top: 3px solid oklch(19% 0.02 45); padding-top: 20px;\">\n          <h3 style=\"{{ accentTextStyleLight }}\">{{ item.title }}</h3>\n          <p style=\"font-size: 15px; line-height: 1.9; color: oklch(30% 0.02 45); margin: 0;\">{{ item.body }}</p>\n        </div>\n      </sc-for>\n    </div>\n  </section>\n\n  <!-- FAQ -->\n  <section id=\"faq\" data-screen-label=\"FAQ\" style=\"padding: clamp(56px, 8vw, 100px) clamp(20px, 6vw, 64px); background: oklch(94% 0.015 65);\">\n    <div style=\"max-width: 720px; margin: 0 auto;\">\n      <h2 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(26px, 3.4vw, 36px); margin: 0 0 40px;\">よくある質問</h2>\n      <div style=\"display: flex; flex-direction: column;\">\n        <sc-for list=\"{{ faqs }}\" as=\"item\" hint-placeholder-count=\"5\">\n          <div style=\"border-bottom: 1px solid oklch(85% 0.02 60);\">\n            <div onclick=\"{{ item.onToggle }}\" style=\"display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 22px 4px; cursor: pointer;\">\n              <span style=\"font-weight: 700; font-size: 16px;\">{{ item.q }}</span>\n              <span style=\"{{ item.iconStyle }}\">+</span>\n            </div>\n            <sc-if value=\"{{ item.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"font-size: 15px; line-height: 1.9; color: oklch(40% 0.03 50); margin: 0 0 22px; padding: 0 4px;\">{{ item.a }}</p>\n            </sc-if>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n  </section>\n\n  <!-- FINAL CTA -->\n  <section data-screen-label=\"Final CTA\" style=\"background: oklch(21% 0.03 265); color: oklch(95% 0.02 90); padding: clamp(64px, 10vw, 130px) clamp(20px, 6vw, 64px); text-align: center;\">\n    <h2 style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: clamp(28px, 4vw, 44px); margin: 0 0 20px;\">変わるなら、今夜から。</h2>\n    <p style=\"font-size: clamp(15px, 1.2vw, 18px); color: oklch(75% 0.03 90); margin: 0 0 36px;\">宣言は、勇気じゃない。仕組みだ。</p>\n    <a href=\"#plans\" style=\"{{ finalCtaStyle }}\" style-hover=\"filter: brightness(0.92);\">今すぐ申し込む</a>\n  </section>\n\n  <!-- FOOTER -->\n  <footer data-screen-label=\"Footer\" style=\"background: oklch(19% 0.02 45); color: oklch(70% 0.02 60); padding: 40px clamp(20px, 6vw, 64px); display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;\">\n    <span style=\"font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 900; font-size: 18px; color: oklch(90% 0.01 60);\">オキトレ</span>\n    <div style=\"display: flex; gap: 24px; flex-wrap: wrap;\">\n      <a href=\"#concept\" style=\"font-size: 13px; font-weight: 600;\">オキトレとは</a>\n      <a href=\"#plans\" style=\"font-size: 13px; font-weight: 600;\">料金プラン</a>\n      <a href=\"#faq\" style=\"font-size: 13px; font-weight: 600;\">よくある質問</a>\n      <a href=\"https://app.notion.com/p/38c4420eaec5808d8865f0f77c545849?source=copy_link\" target=\"_blank\" rel=\"noopener\" style=\"font-size: 13px; font-weight: 600;\">特定商取引法に基づく表記</a>\n    </div>\n    <span style=\"font-size: 12px;\">© 2026 オキトレ</span>\n  </footer>\n\n</div>\n\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#F2735A&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#F2894A&quot;, &quot;#F2735A&quot;, &quot;#E0679E&quot;, &quot;#3FAFA8&quot;], &quot;section&quot;: &quot;見た目&quot; },\n  &quot;heroStyle&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;sunrise&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;sunrise&quot;, &quot;night&quot;], &quot;section&quot;: &quot;見た目&quot; },\n  &quot;highlightPlan&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;pro&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;pro&quot;, &quot;normal&quot;], &quot;section&quot;: &quot;料金プラン&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { openFaq: 0 };\n\n  toggleFaq = (i) => {\n    this.setState(s => ({ openFaq: s.openFaq === i ? -1 : i }));\n  };\n\n  renderVals() {\n    const accent = this.props.accentColor ?? '#F2894A';\n    const heroVariant = this.props.heroStyle ?? 'sunrise';\n    const highlightPlan = this.props.highlightPlan ?? 'pro';\n\n    const tint = `color-mix(in srgb, ${accent} 14%, white)`;\n    const isNight = heroVariant === 'night';\n\n    const heroSectionStyle = isNight\n      ? { background: 'oklch(18% 0.025 265)' }\n      : { background: 'oklch(95% 0.025 60)' };\n\n    const heroSubTextStyle = {\n      color: isNight ? 'oklch(78% 0.03 90)' : 'oklch(45% 0.03 50)',\n      fontSize: 'clamp(16px, 1.3vw, 19px)', lineHeight: 1.9, maxWidth: '480px', margin: '0 0 36px',\n    };\n    const heroSecondaryLinkStyle = {\n      color: isNight ? 'oklch(85% 0.02 90)' : 'oklch(30% 0.02 45)',\n      fontSize: '15px', fontWeight: 700, padding: '16px 8px',\n    };\n    const heroBadgeStyle = {\n      background: isNight ? 'oklch(28% 0.04 265)' : tint, color: accent,\n      display: 'inline-block', padding: '8px 16px', borderRadius: '999px', fontSize: '13px', fontWeight: 700, marginBottom: '24px',\n    };\n    const heroVisualStyle = {\n      aspectRatio: '1 / 1', width: '100%', maxWidth: '320px', margin: '0 auto', borderRadius: '18px', overflow: 'hidden',\n      border: '1px solid oklch(85% 0.02 60)', boxShadow: '0 16px 32px -20px oklch(20% 0.05 40 / 0.3)',\n    };\n\n    const logoMarkStyle = { width: '20px', height: '20px', borderRadius: '50%', background: accent };\n\n    const ctaBase = { background: accent, color: '#fff', fontWeight: 700, whiteSpace: 'nowrap', display: 'inline-block', borderRadius: '999px' };\n    const ctaButtonStyle = { ...ctaBase, padding: '10px 20px', fontSize: '14px' };\n    const heroPrimaryCtaStyle = { ...ctaBase, padding: '16px 32px', fontSize: '16px' };\n    const finalCtaStyle = { ...ctaBase, padding: '18px 40px', fontSize: '17px' };\n\n    const accentTextStyle = { color: accent };\n    const accentIndexStyle = { color: accent, fontWeight: 900, fontSize: '14px', letterSpacing: '0.05em', flexShrink: '0', width: '28px' };\n    const accentTextStyleLight = {\n      color: `color-mix(in srgb, ${accent} 78%, black)`,\n      fontFamily: \"'Zen Kaku Gothic New', sans-serif\", fontWeight: 900, fontSize: '19px', margin: '0 0 14px',\n    };\n    const stepColumnStyle = { borderTop: `3px solid ${accent}`, paddingTop: '20px' };\n    const accentBigNumberStyle = { color: accent, fontFamily: \"'Zen Kaku Gothic New', sans-serif\", fontWeight: 900, fontSize: '15px', letterSpacing: '0.05em' };\n\n    const rawProblems = [\n      { text: 'アラームを何個かけても、二度寝してしまう' },\n      { text: '「明日こそ早起きする」が口癖になっている' },\n      { text: '一人だと、どうしても甘えてしまう' },\n      { text: '朝の時間があれば、もっと努力できるのに' },\n    ];\n    const problems = rawProblems.map((p, i) => ({ ...p, index: `0${i + 1}` }));\n\n    const steps = [\n      { n: 'STEP 01', title: '21時までに宣言する', desc: '寝る時間・起きる時間・やることの3つを、その日のうちに宣言。逃げ道をなくす。' },\n      { n: 'STEP 02', title: '朝、通話に接続する', desc: '宣言した起床時間になったらオキトレ通話へ。仲間がいるから起きられる。' },\n      { n: 'STEP 03', title: '宣言を、実行する', desc: '起きたら終わりじゃない。宣言した「やること」に取り組んで、その日を始める。' },\n    ];\n\n    const audiences = [\n      { title: '学生の方へ', body: '受験勉強も、課題も、朝の1時間が勝負を分ける。同じ朝を戦う仲間と一緒に、遅刻グセとサヨナラしよう。' },\n      { title: '経営者・フリーランスの方へ', body: '誰にも管理されない働き方だからこそ、自分を律する仕組みが要る。朝の宣言と通話が、一日の質を変える。' },\n    ];\n\n    const rawPlans = [\n      {\n        key: 'normal',\n        name: '通常プラン',\n        price: '500',\n        badge: null,\n        link: 'https://buy.stripe.com/aFa5kFdw4gXB6LM15L4F203',\n        features: [\n          '寝る時間・起きる時間・やることの宣言',\n          '毎朝の朝活通話に参加',\n          '自分のペースで続けられる',\n        ],\n        cta: '通常プランで申し込む',\n      },\n      {\n        key: 'pro',\n        name: 'Proプラン',\n        price: '5,000',\n        badge: '本気の人向け',\n        link: 'https://buy.stripe.com/4gM9AVgIg9v91rs8yd4F204',\n        features: [\n          '通常プランの全機能',\n          '21時までに就寝・起床・やることを宣言',\n          '就寝時刻に「寝た証拠」を送信',\n          '起床時間になったら電話で起こしにいく',\n          '朝活通話に強制参加',\n        ],\n        cta: 'Proプランで申し込む',\n      },\n    ];\n\n    const plans = rawPlans.map(p => {\n      const isHighlighted = p.key === highlightPlan;\n      return {\n        ...p,\n        cardStyle: {\n          background: isHighlighted ? `color-mix(in srgb, ${accent} 6%, white)` : '#fff',\n          color: 'oklch(19% 0.02 45)',\n          border: isHighlighted ? `2px solid ${accent}` : '1px solid oklch(85% 0.02 60)',\n          borderRadius: '18px', padding: '36px 32px',\n        },\n        badgeStyle: {\n          background: tint, color: `color-mix(in srgb, ${accent} 80%, black)`,\n          padding: '3px 10px', borderRadius: '999px', fontSize: '12px', fontWeight: 700,\n        },\n        checkStyle: {\n          background: accent, color: '#fff',\n          width: '18px', height: '18px', borderRadius: '50%', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontSize: '11px', fontWeight: 900, marginTop: '2px',\n        },\n        ctaStyle: {\n          background: isHighlighted ? accent : 'oklch(90% 0.02 65)',\n          color: isHighlighted ? '#fff' : 'oklch(19% 0.02 45)',\n          display: 'block', textAlign: 'center', padding: '15px', borderRadius: '999px', fontWeight: 700, fontSize: '15px',\n        },\n      };\n    });\n\n    const rawFaqs = [\n      { q: '通話は毎日ありますか？', a: 'はい。朝活通話は毎日開催しています。参加できない日があっても大丈夫、無理のない範囲で続けてください。' },\n      { q: '支払い方法は？', a: 'クレジットカードによる月額課金です（Stripe決済）。いつでも解約できます。' },\n      { q: '学生でも参加できますか？', a: 'もちろんです。受験や課題に取り組む学生から、経営者・フリーランスまで幅広く参加しています。' },\n    ];\n\n    const faqs = rawFaqs.map((f, i) => {\n      const open = this.state.openFaq === i;\n      return {\n        ...f,\n        open,\n        onToggle: () => this.toggleFaq(i),\n        iconStyle: {\n          color: accent, transform: open ? 'rotate(45deg)' : 'rotate(0deg)', transition: 'transform 0.2s ease',\n          fontFamily: \"'Zen Kaku Gothic New', sans-serif\", fontWeight: 900, fontSize: '20px', flexShrink: 0,\n        },\n      };\n    });\n\n    return {\n      heroSectionStyle,\n      heroSubTextStyle,\n      heroSecondaryLinkStyle,\n      hero
